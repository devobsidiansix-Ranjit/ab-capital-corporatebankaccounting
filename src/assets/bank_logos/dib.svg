<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <!-- Green Globe Icon -->
  <g transform="translate(15, 10)">
    <!-- Globe Base -->
    <circle cx="20" cy="20" r="20" fill="#007A33" />
    <!-- Yellow grid lines -->
    <path d="M 0 20 A 20 20 0 0 0 40 20" fill="none" stroke="#FFC72C" stroke-width="1.5" />
    <path d="M 20 0 A 20 20 0 0 0 20 40" fill="none" stroke="#FFC72C" stroke-width="1.5" />
    <path d="M 5 10 C 15 15, 25 15, 35 10" fill="none" stroke="#FFC72C" stroke-width="1.2" />
    <path d="M 5 30 C 15 25, 25 25, 35 30" fill="none" stroke="#FFC72C" stroke-width="1.2" />
    <path d="M 10 5 C 18 15, 18 25, 10 35" fill="none" stroke="#FFC72C" stroke-width="1.2" />
    <path d="M 30 5 C 22 15, 22 25, 30 35" fill="none" stroke="#FFC72C" stroke-width="1.2" />
    <!-- Red star in center -->
    <polygon points="20,15 22,19 26,19 23,22 24,26 20,24 16,26 17,22 14,19 18,19" fill="#C8102E" />
  </g>
  <!-- Text -->
  <text x="65" y="42" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-weight="900" font-size="34" fill="#007A33" letter-spacing="-0.5">DIB</text>
</svg>
